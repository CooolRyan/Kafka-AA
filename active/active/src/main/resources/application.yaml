server:
  port: 8080

spring:
  application:
    name: active

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# 두 개의 독립 KRaft 단일 브로커(A=001, B=002).
#
# 기본값은 EXTERNAL 리스너(공인:9094). 로컬 PC·로컬 서버가 VPC 사설(192.168.100.x)에 없을 때 사용.
# 브로커는 이중 리스너로 advertised 에 공인:9094 를 광고해야 함 (infra/kafka/server-kraft-node*-dual-listener.properties, ACG 9094).
# 같은 VPC 안에서만 돌릴 때는 아래 사설:9092 로 바꿔도 됨.
app:
  kafka:
    clusters:
      A:
        bootstrap-servers: 211.188.50.31:9094
      B:
        bootstrap-servers: 223.130.154.172:9094
      # VPC 내부 전용 예시:
      # A: { bootstrap-servers: 192.168.100.6:9092 }
      # B: { bootstrap-servers: 192.168.100.7:9092 }
    producer-topic: aa-demo-events
    consumer:
      primary: A
      topic: aa-demo-events
      group-id: aa-demo-app
    failover-watchdog-enabled: true
    failover-check-interval-ms: 15000

  # 미러 “딜레이” 근사: 소스 vs 미러 토픽의 latest offset 차이 합 → Micrometer + ClickHouse
  mirror-metrics:
    enabled: true
    interval-ms: 15000
    source-cluster: A
    mirror-cluster: B
    source-topic: aa-demo-events
    mirror-topic: A.aa-demo-events
    # ClickHouse mirror_message_tail 적재 시 소스/미러 각각 최대 N건
    tail-sample-limit: 24
    tail-to-clickhouse: true

  clickhouse:
    enabled: true
    http-url: http://192.168.160.147:8123
    database: default
    user: default
    password: ""
