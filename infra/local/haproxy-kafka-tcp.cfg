# 로컬에서 TCP 레벨로 브로커 두 대에 연결을 나누는 예시 (연결 단위 라운드로빈).
# 주의: 메시지 단위 5:5는 이 파일만으로는 보장되지 않으며, 이 프로젝트의 Spring Producer가 라운드로빈으로 처리합니다.
# HAProxy는 "같은 토픽·같은 클러스터"가 아닌 두 독립 브로커를 한 포트로 섞을 때 오프셋/메타 혼선이 나므로
# active-active 데모에서는 앱에서 A/B를 분리하는 현재 방식을 권장합니다.
#
# 사용 예: haproxy -f haproxy-kafka-tcp.cfg
#   frontend fe_demo -> backend be_roundrobin -> server s1 192.168.100.6:9092 / server s2 192.168.100.7:9092

global
  maxconn 256

defaults
  mode tcp
  timeout connect 5s
  timeout client 60m
  timeout server 60m

listen kafka_demo
  bind 127.0.0.1:19092
  balance roundrobin
  server kafkaA 192.168.100.6:9092 check
  server kafkaB 192.168.100.7:9092 check
