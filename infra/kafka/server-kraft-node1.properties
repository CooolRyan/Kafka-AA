# KRaft 단일 노드 (클러스터 A) — kafka-active001 / 192.168.100.6
# 설치 후: kafka-storage.sh format -t $(kafka-storage.sh random-uuid) -c /etc/kafka/server.properties

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@192.168.100.6:9093

listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
advertised.listeners=PLAINTEXT://192.168.100.6:9092
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

log.dirs=/var/lib/kafka/kraft-combined-logs

num.partitions=3
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

group.initial.rebalance.delay.ms=0
