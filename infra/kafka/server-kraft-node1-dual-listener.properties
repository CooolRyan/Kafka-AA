# kafka-active001 — 사설 PLAINTEXT:9092 + 외부 EXTERNAL:9094(공인 광고)
# NCP ACG/방화벽에서 9094 TCP 인바운드 허용 필요.
# 적용: 백업 후 /etc/kafka/server.properties 로 복사하고 systemctl restart kafka

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@192.168.100.6:9093

# inter.broker 는 기존과 동일하게 PLAINTEXT 이름 유지 (INTERNAL 로 바꾸면 KRaft 메타데이터와 DUPLICATE_BROKER_REGISTRATION 충돌 가능)
listeners=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
advertised.listeners=PLAINTEXT://192.168.100.6:9092,EXTERNAL://211.188.50.31:9094
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT

log.dirs=/var/lib/kafka/kraft-combined-logs

num.partitions=3
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

group.initial.rebalance.delay.ms=0
