# MirrorMaker 2 전용 프로세스용 (Kafka 4)
# 실행 예 (003번 배스천 등): connect-mirror-maker.sh mm2-remote.properties
clusters = A, B
A.bootstrap.servers = 192.168.100.6:9092
B.bootstrap.servers = 192.168.100.7:9092

A->B.enabled = true
B->A.enabled = true

replication.factor=1
checkpoints.topic.replication.factor=1
heartbeats.topic.replication.factor=1
offset-syncs.topic.replication.factor=1

# Connect 내부 토픽(mm2-offsets.*.internal, mm2-configs.*, mm2-status.*) RF — 단일 브로커면 반드시 1
# (없으면 기본 3으로 잡혀 InvalidReplicationFactor / 생성 재시도)
offset.storage.replication.factor=1
status.storage.replication.factor=1
config.storage.replication.factor=1

# 기본 토픽 프리픽스 (MM2): A. / B. 형태로 상대 클러스터에 생성됨
refresh.topics.interval.seconds = 10
sync.topic.acls.enabled = false
