# Kafka TCP failover (active / backup) — 147 앱 서버에서 HAProxy 실행 예시
#
# Spring consumer bootstrap: 127.0.0.1:19092  (app.kafka.consumer-mode=proxy)
# A 장애(check 실패) 시에만 B:9094 로 신규 TCP 연결을 넘김 (HAProxy backup).
#
# 주의:
# - A/B 는 독립 KRaft 클러스터. B 로 붙으면 B 의 메타데이터·오프셋을 쓴다 (A 와 동일 offset 아님).
# - 브로커 advertised.listeners 가 공인 IP 이면, 일부 클라이언트는 프록시를 우회할 수 있음.
# - 진짜 active-active 는 MM2 + offset sync + 단일 논리 토픽 설계가 별도로 필요.
#
# 실행 (147):
#   sudo haproxy -f /path/to/kafka-failover-active-backup.cfg -D
#   ss -lntp | grep 19092

global
  maxconn 4096
  log /dev/log local0

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5s
  timeout client 60m
  timeout server 60m

frontend kafka_failover_fe
  bind 127.0.0.1:19092
  default_backend kafka_failover_be

backend kafka_failover_be
  option tcp-check
  # tcp-check: connect only (Kafka 는 HTTP check 불가)
  tcp-check connect port 9094
  # Primary = cluster A (application.yaml A bootstrap 과 동일하게 맞출 것)
  server kafkaA 211.188.50.31:9094 check inter 3s fall 2 rise 2
  # A 가 down 일 때만 사용
  server kafkaB 223.130.154.172:9094 check inter 3s fall 2 rise 2 backup
